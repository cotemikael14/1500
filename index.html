<!DOCTYPE html>
<html lang="fr">
<head>

  window.dataLayer = window.dataLayer || [];

<meta charset="UTF-8">
<title>Compteur</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #00ffea;
        font-family: "Roboto Mono", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        min-height: 100vh;
        overflow-x: hidden;
    }

    h1 {
        margin-top: 2vh;
        margin-bottom: 3vh;
        font-size: 4vw;
        color: #fff;
        text-shadow: 0 0 20px #00f0ff;
    }

    /* Timer en responsive : une ou deux lignes selon la largeur */
    #timer {
        font-weight: bold;
        letter-spacing: 3px;
        text-shadow: 0 0 30px #00ffe5;
        display: flex;
        flex-direction: row;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        font-size: 10vw;
        max-width: 95%;
    }

    #timer span {
        display: block;
    }

    /* Petit écran → timer sur deux lignes */
    @media (max-width: 600px) {
        #timer {
            flex-direction: column;
            font-size: 14vw;
        }
    }

    /* Grand écran → une seule ligne */
    @media (min-width: 800px) {
        #timer {
            flex-direction: row;
            font-size: 7vw;
        }
    }

    .logo-container {
        display: flex;
        gap: 5vw;
        margin-top: 5vh;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
    }

    .logo-container img {
        height: 20vw;
        max-height: 220px;
        filter: drop-shadow(0 0 20px #00ffe5);
    }

</style>
</head>

<body>

<h1>SANS CONVENTION COLLECTIVE DEPUIS :</h1>

<div id="timer">
    <span id="daysText">0 jours</span>
    <span id="timeText">00:00:00</span>
</div>

<div class="logo-container">
    <img src="scfp1500.png" alt="SCFP 1500">
    <img src="scfp957.png" alt="SCFP 957">
</div>

<script>
    function updateTimer() {
        var tz = 'America/Toronto';
        var now = new Date();

        // Obtenir l'heure actuelle en composantes du fuseau Québec
        var fmt = new Intl.DateTimeFormat('en-CA', {
            timeZone: tz,
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        });
        var parts = {};
        fmt.formatToParts(now).forEach(function(p) {
            parts[p.type] = parseInt(p.value, 10);
        });

        // Utiliser Date.UTC pour éviter que le fuseau local du navigateur
        // n'introduise un décalage DST entre startQc (EST) et nowQc (EDT)
        var nowQc = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);

        // Départ : minuit le 1er janvier 2024, heure du Québec
        var startQc = Date.UTC(2024, 0, 1, 0, 0, 0);

        var diff = nowQc - startQc;
        var totalSeconds = Math.floor(diff / 1000);

        // Comptage ordinal : le 1er janvier 2024 = jour 1
        var days = Math.floor(totalSeconds / 86400) + 1;
        var h = Math.floor((totalSeconds % 86400) / 3600);
        var m = Math.floor((totalSeconds % 3600) / 60);
        var s = totalSeconds % 60;

        document.getElementById("daysText").textContent = days + ' jours';
        document.getElementById("timeText").textContent =
            String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
